<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BalanceFit - Tu Entrenador IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary: #3b82f6;
            --secondary: #10b981;
            --dark: #0f172a;
        }
        .loading-shimmer {
            background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .tab-active {
            @apply border-b-4 border-blue-600 text-blue-600;
        }
        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900 pb-20">

    <div class="max-w-2xl mx-auto px-4 py-8">
        <header class="text-center mb-6">
            <h1 class="text-3xl font-black text-slate-800 tracking-tight">BalanceFit <span class="text-blue-600">AI</span></h1>
        </header>

        <nav class="flex justify-around mb-8 bg-white rounded-2xl shadow-sm p-1 border border-slate-100">
            <button onclick="switchTab('analyze')" id="tab-analyze" class="flex-1 py-3 text-sm font-bold uppercase tracking-tighter tab-active">Analizar</button>
            <button onclick="switchTab('history')" id="tab-history" class="flex-1 py-3 text-sm font-bold uppercase tracking-tighter text-slate-400">Historial</button>
            <button onclick="switchTab('timer')" id="tab-timer" class="flex-1 py-3 text-sm font-bold uppercase tracking-tighter text-slate-400">Timer</button>
        </nav>

        <main class="space-y-6">
            <section id="sec-analyze" class="fade-in">
                <div class="bg-white rounded-[2rem] shadow-xl shadow-slate-200 overflow-hidden border border-slate-100 p-6 md:p-8">
                    <div class="space-y-6">
                        <div>
                            <label class="block text-xs font-black text-slate-400 mb-2 uppercase">Entrenamiento de hoy</label>
                            <textarea id="exerciseInput" rows="3" 
                                class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition-all"
                                placeholder="Ej: 3 series de jumping jacks..."></textarea>
                        </div>

                        <div class="flex gap-2">
                            <label class="flex-1 flex items-center justify-center gap-2 p-4 bg-slate-100 rounded-2xl border-2 border-dashed border-slate-200 cursor-pointer hover:bg-slate-200 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
                                </svg>
                                <span class="text-xs font-bold text-slate-600 uppercase text-center leading-tight">Multimedia</span>
                                <input type="file" id="mediaInput" accept="image/*,video/*" class="hidden">
                            </label>
                            <button id="analyzeBtn" class="flex-[2] bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-2xl shadow-lg shadow-blue-200 transition-all active:scale-95 uppercase text-sm">
                                Analizar Técnica
                            </button>
                        </div>

                        <div id="mediaPreviewContainer" class="hidden relative rounded-2xl overflow-hidden aspect-video bg-black border-4 border-white shadow-md">
                            <img id="imagePreview" class="hidden w-full h-full object-cover">
                            <video id="videoPreview" class="hidden w-full h-full object-cover" controls></video>
                            <button id="removeMedia" class="absolute top-2 right-2 bg-red-500 text-white p-1.5 rounded-full">✕</button>
                        </div>
                    </div>

                    <div id="loading" class="hidden mt-8 space-y-4">
                        <div class="flex items-center gap-3">
                            <div class="animate-spin h-5 w-5 border-3 border-blue-600 border-t-transparent rounded-full"></div>
                            <span class="text-blue-600 font-bold text-sm">Conectando con la IA...</span>
                        </div>
                        <div class="loading-shimmer h-32 w-full rounded-2xl"></div>
                    </div>

                    <div id="result" class="hidden mt-8 fade-in border-t border-slate-100 pt-6">
                        <h2 class="text-xl font-black mb-4">Tu Informe IA</h2>
                        <div id="analysisContent" class="prose prose-slate text-sm text-slate-600 mb-6"></div>
                        <h3 class="text-sm font-black text-slate-800 uppercase mb-4 tracking-widest">Ejercicios Recomendados</h3>
                        <div id="visualGuide" class="grid grid-cols-1 gap-4"></div>
                    </div>
                </div>
            </section>

            <section id="sec-history" class="hidden fade-in">
                <div class="bg-white rounded-[2rem] p-6 shadow-xl border border-slate-100">
                    <h2 class="text-xl font-black mb-4">Historial Local</h2>
                    <div id="historyList" class="space-y-4">
                        <p class="text-slate-400 text-center py-10 italic text-sm">Sin registros.</p>
                    </div>
                </div>
            </section>

            <section id="sec-timer" class="hidden fade-in">
                <div class="bg-slate-900 rounded-[2.5rem] p-10 text-center shadow-2xl relative overflow-hidden">
                    <div class="relative z-10">
                        <h2 class="text-blue-400 font-black text-xs uppercase tracking-[0.3em] mb-6">Timer</h2>
                        <div id="timerDisplay" class="text-7xl font-black text-white mb-10 tabular-nums">01:00</div>
                        <div class="flex justify-center gap-4">
                            <button id="timerToggle" class="bg-white text-slate-900 px-8 py-3 rounded-xl font-black uppercase text-sm">Start</button>
                            <button id="timerReset" class="bg-slate-800 text-slate-400 px-8 py-3 rounded-xl font-black uppercase text-sm">Reset</button>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script type="module">
const apiKey = "AIzaSyB5MFZ-T0bRJc2z7iOIR_RxB-FWvp7Go2o"; 
        // --- ESTADO ---
        let timerSeconds = 60;
        let timerInterval = null;
        let isTimerRunning = false;
        let base64Media = null;
        let mimeType = null;
        let history = JSON.parse(localStorage.getItem('fitHistory') || '[]');

        // --- SELECTORES ---
        const analyzeBtn = document.getElementById('analyzeBtn');
        const exerciseInput = document.getElementById('exerciseInput');
        const mediaInput = document.getElementById('mediaInput');
        const resultDiv = document.getElementById('result');
        const loadingDiv = document.getElementById('loading');
        const analysisContent = document.getElementById('analysisContent');
        const visualGuide = document.getElementById('visualGuide');
        const timerDisplay = document.getElementById('timerDisplay');
        const timerToggle = document.getElementById('timerToggle');

        window.switchTab = (tab) => {
            ['analyze', 'history', 'timer'].forEach(t => {
                document.getElementById(`sec-${t}`).classList.add('hidden');
                document.getElementById(`tab-${t}`).classList.remove('tab-active', 'text-blue-600');
                document.getElementById(`tab-${t}`).classList.add('text-slate-400');
            });
            document.getElementById(`sec-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).classList.add('tab-active', 'text-blue-600');
            if(tab === 'history') renderHistory();
        };

        mediaInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                mimeType = file.type;
                const reader = new FileReader();
                reader.onload = (event) => {
                    base64Media = event.target.result.split(',')[1];
                    document.getElementById('mediaPreviewContainer').classList.remove('hidden');
                    if (mimeType.startsWith('video')) {
                        document.getElementById('videoPreview').src = event.target.result;
                        document.getElementById('videoPreview').classList.remove('hidden');
                        document.getElementById('imagePreview').classList.add('hidden');
                    } else {
                        document.getElementById('imagePreview').src = event.target.result;
                        document.getElementById('imagePreview').classList.remove('hidden');
                        document.getElementById('videoPreview').classList.add('hidden');
                    }
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('removeMedia').addEventListener('click', () => {
            base64Media = null;
            document.getElementById('mediaPreviewContainer').classList.add('hidden');
        });

        async function runAnalysis() {
            const userText = exerciseInput.value.trim();
            if (!userText && !base64Media) return;

            loadingDiv.classList.remove('hidden');
            resultDiv.classList.add('hidden');
            analyzeBtn.disabled = true;

            const prompt = `Analiza mi entrenamiento: "${userText}". 
            1. Describe brevemente los beneficios musculares.
            2. Lista 2 ejercicios de compensación.
            3. Formatea las recomendaciones estrictamente como [GUIA: Nombre Ejercicio].`;

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

            const payload = {
                contents: [{ 
                    parts: [
                        { text: prompt }, 
                        ...(base64Media ? [{ inlineData: { mimeType, data: base64Media }}] : [])
                    ] 
                }],
                systemInstruction: { parts: [{ text: "Eres un experto en biomecánica. Responde en español de forma concisa." }] }
            };

            let retries = 5;
            let delay = 1000;
            let success = false;

            while (retries > 0 && !success) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.error?.message || "Error en la API");
                    }

                    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!text) throw new Error("La IA no devolvió contenido.");

                    displayResults(text, userText);
                    saveToHistory(userText, text);
                    success = true;
                } catch (e) {
                    retries--;
                    if (retries === 0) {
                        alert("Error técnico: " + e.message);
                    } else {
                        await new Promise(r => setTimeout(r, delay));
                        delay *= 2;
                    }
                }
            }
            
            loadingDiv.classList.add('hidden');
            analyzeBtn.disabled = false;
        }

        function displayResults(text, originalInput) {
            const cleanText = text.replace(/\[GUIA: (.*?)\]/g, '').replace(/\n/g, '<br>');
            analysisContent.innerHTML = cleanText;
            
            const exerciseMatches = text.match(/\[GUIA: (.*?)\]/g) || [];
            visualGuide.innerHTML = '';
            
            exerciseMatches.forEach(match => {
                const name = match.replace('[GUIA: ', '').replace(']', '');
                const card = document.createElement('div');
                card.className = "bg-slate-50 border border-slate-200 rounded-2xl p-4 flex gap-4 items-center fade-in";
                card.innerHTML = `
                    <div class="w-16 h-16 bg-blue-100 rounded-xl flex items-center justify-center text-blue-500 shrink-0">
                         <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=3b82f6&color=fff" class="w-full h-full rounded-xl">
                    </div>
                    <div>
                        <h4 class="font-bold text-slate-800 text-sm">${name}</h4>
                        <p class="text-[10px] text-slate-500 uppercase font-black tracking-widest">Recomendado</p>
                    </div>
                `;
                visualGuide.appendChild(card);
            });
            resultDiv.classList.remove('hidden');
        }

        function saveToHistory(input, analysis) {
            const entry = {
                date: new Date().toLocaleDateString('es-ES', { day: 'numeric', month: 'short' }),
                input: input || "Entrada Visual"
            };
            history.unshift(entry);
            localStorage.setItem('fitHistory', JSON.stringify(history.slice(0, 10)));
        }

        function renderHistory() {
            if (history.length === 0) {
                historyList.innerHTML = '<p class="text-slate-400 text-center py-10 italic text-sm">Sin registros.</p>';
                return;
            }
            historyList.innerHTML = history.map(item => `
                <div class="p-4 bg-slate-50 rounded-xl border border-slate-100">
                    <span class="text-[10px] font-black uppercase text-blue-500">${item.date}</span>
                    <p class="font-bold text-slate-800 text-sm">${item.input}</p>
                </div>
            `).join('');
        }

        analyzeBtn.addEventListener('click', runAnalysis);
    </script>
</body>
</html>
